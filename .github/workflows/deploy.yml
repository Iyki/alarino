name: Deployment

on:
  push:
    branches: ["main"]

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: alarino_backend/pyproject.toml

      - name: Install backend package
        working-directory: alarino_backend
        run: python -m pip install -e '.[dev]'

      - name: Backend import smoke test
        working-directory: alarino_backend
        env:
          DATABASE_URL: "sqlite:///:memory:"
          ADMIN_API_KEY: "ci-test-key"
        run: python -c "from alarino_backend.app import create_app; app = create_app(); assert 'sqlalchemy' in app.extensions"

      - name: Backend tests
        working-directory: alarino_backend
        env:
          DATABASE_URL: "sqlite:///:memory:"
          ADMIN_API_KEY: "ci-test-key"
        run: python -m pytest

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install

      - name: Frontend lint
        working-directory: frontend
        run: npm run lint

      - name: Frontend typecheck
        working-directory: frontend
        run: npm run typecheck

      - name: Frontend unit/component/proxy tests
        working-directory: frontend
        run: npm run test

      - name: Frontend production build
        working-directory: frontend
        run: npm run build

      - name: Build backend and frontend images
        run: docker compose -f docker-compose.yml -f docker-compose.prod.yml build backend frontend

      - name: Set up SSH
        uses: webfactory/ssh-agent@v0.10.0
        with:
          ssh-private-key: ${{ secrets.SSH_KEY_DEPLOY }}

      - name: Deploy to DigitalOcean
        env:
          BACKEND_ENV_FILE: ${{ secrets.BACKEND_ENV_FILE }}
        run: |
          printf "%s" "$BACKEND_ENV_FILE" | ssh -o StrictHostKeyChecking=no ${{ secrets.DO_USERNAME }}@${{ secrets.DO_HOST }} '
            set -e

            if [ ! -d ~/alarino/.git ]; then
              git clone https://github.com/Iyki/alarino.git ~/alarino
            fi

            cd ~/alarino
            umask 077
            cat > alarino_backend/.env

            echo "Pulling latest changes..."
            git pull origin main

            echo "Saving rollback tags from current latest images..."
            docker image inspect alarino-10-backend:latest >/dev/null 2>&1 && docker tag alarino-10-backend:latest alarino-10-backend:rollback || true
            docker image inspect alarino-10-frontend:latest >/dev/null 2>&1 && docker tag alarino-10-frontend:latest alarino-10-frontend:rollback || true

            echo "Cleaning Docker cache/unused artifacts..."
            docker builder prune -af || true
            docker image prune -f || true
            docker container prune -f || true

            echo "Rebuilding and restarting caddy + frontend + backend..."
            docker compose -f docker-compose.yml -f docker-compose.prod.yml up --build -d backend frontend caddy

            echo "Deployment complete."
          '
