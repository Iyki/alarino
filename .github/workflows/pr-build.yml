name: PR Build

on:
  pull_request:
    branches: ["main"]

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: alarino_backend/pyproject.toml

      - name: Install backend package
        working-directory: alarino_backend
        run: python -m pip install -e '.[dev]'

      - name: Backend import smoke test
        working-directory: alarino_backend
        env:
          DATABASE_URL: "sqlite:///:memory:"
          ADMIN_API_KEY: "ci-test-key"
        run: python -c "from alarino_backend.app import create_app; app = create_app(); assert 'sqlalchemy' in app.extensions"

      - name: Backend tests
        working-directory: alarino_backend
        env:
          DATABASE_URL: "sqlite:///:memory:"
          ADMIN_API_KEY: "ci-test-key"
        run: python -m pytest

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Frontend lint
        working-directory: frontend
        run: npm run lint

      - name: Frontend typecheck
        working-directory: frontend
        run: npm run typecheck

      - name: Frontend unit/component/proxy tests
        working-directory: frontend
        run: npm run test

      - name: Frontend production build
        working-directory: frontend
        run: npm run build

      - name: Build backend and frontend images
        run: docker compose -f docker-compose.yml -f docker-compose.prod.yml build backend frontend
